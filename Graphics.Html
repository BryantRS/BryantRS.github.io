<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <svg width="300" height="300" onmousedown="grow()" onmouseup="shrink()">
        <circle cx="150" cy="150"  r="100" fill="blue" stroke="black" stroke-width="5"/>
        <circle cx="115" cy="120" r="10" fill="black" />
        <circle cx="185" cy="120" r="10"/>
        <circle cx="150" cy="200" r="25" stroke="black" stroke-width="5" id="mouth"/>
        <line x1="105" y1="100" x2="125" y2="100" stroke="black" stroke-width="3"/>
        <line x1="175" y1="95" x2="195" y2="85" stroke="black" stroke-width="3"/>
    </svg>
</body>
<script>
    function grow() {
        const circle = document. getElementById("mouth");
        circle.setAttribute("r","40")
                circle.setAttribute("cy","170")
    }
     function shrink() {
        const circle = document. getElementById("mouth");
        circle.setAttribute("r","10")
                circle.setAttribute("cy","220")
     }
</script>
</html>
