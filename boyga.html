<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box 'dem Burgers</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

        #app {
            width: 400px;
        }

        #menu {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
        }

        .item {
            background-color: #d5af66;
            padding: 20px;
            margin: 5px;
            border-radius: 10px;
        }

        .selected {
            background-color: #5a3b01;
        }

        .order {
            margin-top: 30px;
        }

        .slot {
            border: 3px solid #aa894d;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="menu">
            <div class="item" onclick="toggleSelect(this)">Bun</div>
            <div class="item" onclick="toggleSelect(this)">Lettuce</div>
            <div class="item" onclick="toggleSelect(this)">Patty</div>
            <div class="item" onclick="toggleSelect(this)">Pickle</div>
            <div class="item" onclick="toggleSelect(this)">Cheese</div>
            <div class="item" onclick="toggleSelect(this)">Pineapple</div>
            <div class="item" onclick="toggleSelect(this)">Tomato</div>
            <div class="item" onclick="toggleSelect(this)">Onion</div>
            <div class="item" onclick="toggleSelect(this)">Booger</div>
        </div>
        <button onclick="addToOrder()">Add to Your Box</button>
        <div id="order">
        </div>
    </div>


</body>
<script>
    function toggleSelect(element) {
        element.classList.toggle("selected");
    }
    function addToOrder() {
        var orderBox = document.getElementById("order");
        var selectedItems = document.getElementsByClassName("selected");

        var boyga = document.createElement('div');

        for (const item of selectedItems) {
            boyga.innerHTML += item.textContent + " ";

        }
        orderBox.appendChild(boyga)
    }
</script>

</html>
